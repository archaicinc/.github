name: Reusable license PR review

on:
  workflow_call:
    inputs:
      enforcement:
        description: "advisory or blocking"
        required: false
        type: string
        default: advisory
      forbidden_license_regex:
        description: "Regex for licenses that should block/fail"
        required: false
        type: string
        default: '(^|[^L])AGPL|(^|[^L])GPL'
      review_license_regex:
        description: "Regex for licenses that should appear in PR review"
        required: false
        type: string
        default: 'AGPL|Affero|GNU AFFERO|GNU GENERAL PUBLIC LICENSE|(^|[^L])GPL|UNKNOWN|NOASSERTION|NONE'
      post_pr_comment:
        description: "Post/update a sticky PR comment. Keep false to avoid Slack/email PR-comment notifications. Reports are still in job summary/artifacts."
        required: false
        type: boolean
        default: false

# pull_request_target guardrail: caller workflows should invoke this reusable workflow from
# pull_request, not pull_request_target. By default this workflow avoids PR comments
# to prevent Slack/email notification noise; reports are in job summary/artifacts.
permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  license-review:
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.enforcement }}" in
            advisory|blocking) ;;
            *) echo "enforcement must be advisory or blocking" >&2; exit 2 ;;
          esac

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: cyclonedx-json
          output-file: reports/sbom.cyclonedx.json

      - name: Generate package table with Syft
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/repo" docker.io/anchore/syft@sha256:0d17fe46dc648a21c85cdfb67870371caa0efbeacf2451318eec61a629fc842c /repo -o table > reports/packages.txt

      - name: Scan licenses with Trivy
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/repo" docker.io/aquasec/trivy@sha256:de90a656e79b175a294abe85cb8b99670fab83ebf339cccd163e6f584846809a fs \
            --scanners license \
            --format json \
            --output /repo/reports/trivy-license.json \
            /repo

      - name: Supplement Python uv.lock licenses from PyPI
        shell: python
        timeout-minutes: 4
        env:
          FORBIDDEN_LICENSE_REGEX: ${{ inputs.forbidden_license_regex }}
          REVIEW_LICENSE_REGEX: ${{ inputs.review_license_regex }}
          PYPI_LOOKUP_MAX_PACKAGES: "300"
          PYPI_LOOKUP_MAX_WORKERS: "8"
          PYPI_LOOKUP_TOTAL_SECONDS: "150"
        run: |
          import concurrent.futures, json, os, pathlib, re, threading, time, tomllib
          import urllib.error, urllib.parse, urllib.request

          findings = []
          lookup_errors = []
          cache = {}
          cache_lock = threading.Lock()
          review_re = re.compile(os.environ['REVIEW_LICENSE_REGEX'], re.I)
          forbidden_re = re.compile(os.environ['FORBIDDEN_LICENSE_REGEX'], re.I)
          max_packages = int(os.environ.get('PYPI_LOOKUP_MAX_PACKAGES', '300'))
          max_workers = int(os.environ.get('PYPI_LOOKUP_MAX_WORKERS', '8'))
          total_budget = float(os.environ.get('PYPI_LOOKUP_TOTAL_SECONDS', '150'))
          deadline = time.monotonic() + total_budget

          def compact(text, limit=420):
              text = ' '.join(str(text).split())
              return text if len(text) <= limit else text[:limit - 1] + '…'

          def matching_snippet(text):
              if not text:
                  return ''
              matches = []
              for rx in (forbidden_re, review_re):
                  m = rx.search(text)
                  if m:
                      matches.append(m)
              if not matches:
                  return ''
              m = min(matches, key=lambda item: item.start())
              start = max(0, m.start() - 180)
              end = min(len(text), m.end() + 220)
              prefix = '…' if start else ''
              suffix = '…' if end < len(text) else ''
              return compact(prefix + text[start:end] + suffix)

          def pypi_info(name, version):
              key = (name.lower(), version)
              with cache_lock:
                  if key in cache:
                      return cache[key]
              if time.monotonic() > deadline:
                  result = {'_error': 'PyPI lookup skipped: overall time budget exceeded'}
              else:
                  # Escape each path segment fully; uv.lock is PR-controlled input.
                  url = f"https://pypi.org/pypi/{urllib.parse.quote(name, safe='')}/{urllib.parse.quote(version, safe='')}/json"
                  result = None
                  for attempt in range(2):
                      try:
                          with urllib.request.urlopen(url, timeout=8) as r:
                              result = json.load(r).get('info', {})
                              break
                      except urllib.error.HTTPError as exc:
                          if exc.code == 404:
                              result = {'_not_found': True, '_error': 'PyPI lookup failed: HTTP 404 Not Found'}
                              break
                          result = {'_error': f'PyPI lookup failed: HTTP {exc.code}'}
                      except Exception as exc:
                          result = {'_error': f'PyPI lookup failed: {exc}'}
                      if attempt == 0:
                          time.sleep(0.5)
                  if result is None:
                      result = {'_error': 'PyPI lookup failed'}
              with cache_lock:
                  cache[key] = result
              return result

          packages = []
          seen_packages = set()
          for lock_path in pathlib.Path('.').rglob('uv.lock'):
              try:
                  data = tomllib.loads(lock_path.read_text())
              except Exception as exc:
                  findings.append({
                      'Name': 'uv.lock',
                      'Version': '',
                      'License': f'UNKNOWN: failed to parse {lock_path}: {exc}',
                      'Source': str(lock_path),
                      'Manager': 'uv',
                  })
                  continue
              for package in data.get('package', []):
                  name = package.get('name')
                  version = package.get('version')
                  if not name or not version:
                      continue
                  key = (name.lower(), version, str(lock_path))
                  if key in seen_packages:
                      continue
                  seen_packages.add(key)
                  packages.append((name, version, str(lock_path)))

          truncated = len(packages) > max_packages
          packages = packages[:max_packages]

          def inspect_package(item):
              name, version, source = item
              info = pypi_info(name, version)
              license_parts = []
              license_value = (info.get('license') or '').strip()
              classifiers = [c for c in info.get('classifiers', []) if c.startswith('License ::')]
              # Always evaluate the full free-form text with the caller-configured regexes.
              # If it matches, include a bounded snippet around the actual matching text so
              # downstream review_re/forbidden_re sees the same signal that caused inclusion.
              raw_match = matching_snippet(license_value)
              if raw_match:
                  # Long free-form text from PyPI often contains GPL compatibility tables or bundled
                  # dependency notices even when the package classifier is permissive. Do not report
                  # those as package-license findings. Keep only AGPL/Affero snippets (blocking) or
                  # raw matches for packages with no license classifier to avoid hiding real signals.
                  if not classifiers or re.search(r'AGPL|AFFERO', raw_match, re.I):
                      license_parts.append('Raw license text review snippet: ' + raw_match)
              elif license_value and not classifiers and len(license_value) <= 300 and '\n' not in license_value and '\r' not in license_value:
                  license_parts.append(license_value)
              license_parts.extend(classifiers)
              if info.get('_not_found'):
                  # A 404 can indicate an internal path/project package listed in uv.lock.
                  license_parts.append(info['_error'])
              elif info.get('_error'):
                  lookup_errors.append({'Name': name, 'Version': version, 'Source': source, 'Error': info['_error']})
              if not license_parts:
                  return None
              return {
                  'Name': name,
                  'Version': version,
                  'License': ' | '.join(license_parts),
                  'Source': source,
                  'Manager': 'uv/pypi',
              }

          with concurrent.futures.ThreadPoolExecutor(max_workers=max_workers) as executor:
              future_map = {executor.submit(inspect_package, item): item for item in packages}
              for future in concurrent.futures.as_completed(future_map, timeout=max(1, deadline - time.monotonic())):
                  try:
                      result = future.result()
                      if result:
                          findings.append(result)
                  except Exception as exc:
                      name, version, source = future_map[future]
                      lookup_errors.append({'Name': name, 'Version': version, 'Source': source, 'Error': str(exc)})
                  if time.monotonic() > deadline:
                      break

          metadata = {
              'packages_seen': len(seen_packages),
              'packages_processed': len(packages),
              'truncated_by_cap': truncated,
              'max_packages': max_packages,
              'max_workers': max_workers,
              'time_budget_seconds': total_budget,
              'lookup_error_count': len(lookup_errors),
              'lookup_errors_sample': lookup_errors[:20],
          }
          pathlib.Path('reports/python-license-supplement.json').write_text(json.dumps(findings, indent=2, ensure_ascii=False) + '\n')
          pathlib.Path('reports/python-license-supplement-meta.json').write_text(json.dumps(metadata, indent=2, ensure_ascii=False) + '\n')

      - name: Analyze license report
        id: analyze
        shell: python
        env:
          FORBIDDEN_LICENSE_REGEX: ${{ inputs.forbidden_license_regex }}
          REVIEW_LICENSE_REGEX: ${{ inputs.review_license_regex }}
          ENFORCEMENT: ${{ inputs.enforcement }}
        run: |
          import json, os, re
          from pathlib import Path

          data = json.loads(Path('reports/trivy-license.json').read_text())
          supplement_path = Path('reports/python-license-supplement.json')
          python_supplement = json.loads(supplement_path.read_text()) if supplement_path.exists() else []
          forbidden_re = re.compile(os.environ['FORBIDDEN_LICENSE_REGEX'], re.I)
          review_re = re.compile(os.environ['REVIEW_LICENSE_REGEX'], re.I)

          def license_text_for(obj):
              candidates = [
                  obj.get('License'), obj.get('Licenses'), obj.get('LicenseExpression'),
                  obj.get('LicenseFile'), obj.get('LicenseName'), obj.get('LicenseType'),
              ]
              texts = []
              for value in candidates:
                  if not value:
                      continue
                  if isinstance(value, list):
                      texts.extend(str(v) for v in value)
                  elif isinstance(value, dict):
                      texts.append(json.dumps(value, ensure_ascii=False))
                  else:
                      texts.append(str(value))
              return ', '.join(texts)

          findings = []
          for result in data.get('Results', []):
              target = result.get('Target', '')
              for pkg in result.get('Packages', []) or []:
                  license_text = license_text_for(pkg)
                  if not license_text or not review_re.search(license_text):
                      continue
                  findings.append({
                      'package': pkg.get('Name') or pkg.get('PkgName') or 'unknown',
                      'version': pkg.get('Version') or pkg.get('InstalledVersion') or '',
                      'license': license_text,
                      'file': pkg.get('FilePath') or target,
                      'forbidden': bool(forbidden_re.search(license_text)),
                  })
              for vuln in result.get('Vulnerabilities', []) or []:
                  license_text = license_text_for(vuln)
                  if not license_text or not review_re.search(license_text):
                      continue
                  findings.append({
                      'package': vuln.get('PkgName') or vuln.get('Name') or 'unknown',
                      'version': vuln.get('InstalledVersion') or vuln.get('Version') or '',
                      'license': license_text,
                      'file': vuln.get('FilePath') or target,
                      'forbidden': bool(forbidden_re.search(license_text)),
                  })

          for pkg in python_supplement:
              license_text = str(pkg.get('License') or '')
              if not license_text or not review_re.search(license_text):
                  continue
              findings.append({
                  'package': pkg.get('Name') or 'unknown',
                  'version': pkg.get('Version') or '',
                  'license': license_text,
                  'file': pkg.get('Source') or 'uv.lock',
                  'forbidden': bool(forbidden_re.search(license_text)) and not bool(pkg.get('ReviewOnly')),
              })

          unique, seen = [], set()
          for f in findings:
              key = (f['package'], f['version'], f['license'], f['file'])
              if key not in seen:
                  seen.add(key)
                  unique.append(f)
          unique.sort(key=lambda f: (not f['forbidden'], f['package'].lower(), f['version'], f['license']))
          forbidden_count = sum(1 for f in unique if f['forbidden'])

          lines = [
              '<!-- archaic-license-review -->',
              '## ライセンスレビュー / License review',
              '',
          ]
          if unique:
              lines += [
                  f'GPL/AGPL/unknown 系の確認対象が **{len(unique)}件** 見つかりました。うちブロック対象は **{forbidden_count}件** です。',
                  '',
                  '| Package | Version | License | Source | Risk |',
                  '|---|---:|---|---|---|',
              ]
              for f in unique[:100]:
                  risk = 'BLOCK' if f['forbidden'] else 'Review'
                  lines.append(f"| `{f['package']}` | `{f['version']}` | `{f['license']}` | `{f['file']}` | **{risk}** |")
              if len(unique) > 100:
                  lines += ['', f'_Showing first 100 of {len(unique)} findings. See workflow artifacts for full reports._']
          else:
              lines.append('Trivy の検出範囲では GPL/AGPL/unknown ライセンスは見つかりませんでした。')
              lines.append('No GPL/AGPL/unknown license findings were detected by Trivy.')

          lines += [
              '',
              'Artifacts:',
              '- `sbom.cyclonedx.json`',
              '- `packages.txt`',
              '- `trivy-license.json`',
              '- `python-license-supplement.json`',
              '- `python-license-supplement-meta.json`',
              '',
              'Note: scanner output is triage, not legal advice. Check upstream `LICENSE` files for flagged packages.',
          ]
          Path('reports/license-review-comment.md').write_text('\n'.join(lines) + '\n')
          Path('reports/license-findings.json').write_text(json.dumps(unique, indent=2, ensure_ascii=False) + '\n')

          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'forbidden_count={forbidden_count}\n')
              out.write(f'finding_count={len(unique)}\n')

      - name: Upload license artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: license-review
          path: reports/
          if-no-files-found: error

      - name: Write job summary
        shell: bash
        run: cat reports/license-review-comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post sticky PR comment
        if: github.event_name == 'pull_request' && inputs.post_pr_comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('reports/license-review-comment.md', 'utf8');
            const marker = '<!-- archaic-license-review -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Enforce forbidden license policy
        if: inputs.enforcement == 'blocking' && steps.analyze.outputs.forbidden_count != '0'
        run: |
          echo "Forbidden GPL/AGPL license findings detected: ${{ steps.analyze.outputs.forbidden_count }}"
          exit 1
